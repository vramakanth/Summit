<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pursuit — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Lato:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: 'Lato', -apple-system, sans-serif;
  --font-display: 'Fraunces', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --radius: 8px; --radius-sm: 5px;
  --bg:#1a1714;--bg2:#222017;--bg3:#2c291f;--bg4:#38342a;
  --border:rgba(255,235,180,0.10);--border2:rgba(255,235,180,0.20);
  --text:#f2ead8;--text2:#b8a888;--text3:#7a6a50;
  --accent-bg:#e8a838;--accent-bg2:#d4922a;
  --green:#60c888;--red:#e86060;--amber:#e0a040;--blue:#70aaee;--purple:#b08ae0;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;font-optical-sizing:auto;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(232,168,56,0.07) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(192,94,0,0.05) 0%,transparent 50%);}
.login-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:36px;box-shadow:0 8px 40px rgba(0,0,0,.4);animation:fadeIn .3s ease;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-mark{width:36px;height:36px;background:var(--accent-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.login-name{font-size:16px;font-weight:600;color:var(--text);}
.login-badge{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.5px;margin-top:1px;}
.login-heading{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.6px;font-weight:600;margin-bottom:5px;}
.field input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--border2);}
.field input::placeholder{color:var(--text3);}
.field input[readonly]{opacity:.45;cursor:not-allowed;}
.btn{padding:10px 18px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-primary{background:var(--accent-bg);color:#1a1917;width:100%;margin-top:6px;}
.btn-primary:hover{background:var(--accent-bg2);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.error-msg{color:var(--red);font-size:12px;margin-top:10px;min-height:18px;}

/* APP */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;
  gap:12px;padding:0 24px;flex-shrink:0;position:sticky;top:0;z-index:100;}
.topbar-brand{display:flex;align-items:center;gap:9px;}
.topbar-name{font-size:17px;font-weight:500;color:var(--text);font-family:var(--font-display);letter-spacing:-0.015em;}
.topbar-pill{font-size:9px;font-family:var(--mono);font-weight:600;letter-spacing:.8px;padding:2px 8px;
  background:rgba(232,168,56,0.12);color:var(--amber);border:1px solid rgba(232,168,56,0.25);border-radius:100px;}
.topbar-version{font-size:10px;font-family:var(--mono);color:var(--text3);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-user{font-size:12px;color:var(--text3);font-family:var(--mono);}
.topbar-btn{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:5px;}
.topbar-btn:hover{color:var(--text);border-color:var(--border2);}
.topbar-btn.logout:hover{color:var(--red);border-color:rgba(232,96,96,.3);}

/* MAIN */
.main{flex:1;padding:28px 32px;max-width:1100px;width:100%;margin:0 auto;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-bottom:28px;padding:22px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat-card{background:transparent;padding:4px 24px 4px 0;}
.stat-card:last-child{padding-right:0;}
.stat-label{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;font-weight:600;margin-bottom:8px;text-transform:uppercase;}
.stat-value{font-size:32px;font-weight:500;letter-spacing:-0.02em;line-height:1;font-family:var(--font-display);}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;}
.section-title{font-size:14px;font-weight:600;color:var(--text);}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.search-input{padding:7px 11px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:240px;transition:border-color .15s;}
.search-input:focus{border-color:var(--border2);}
.search-input::placeholder{color:var(--text3);}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:var(--bg3);}
th{padding:10px 16px;text-align:left;font-size:10px;font-family:var(--mono);color:var(--text3);font-weight:600;
  letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,235,180,0.02);}

.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:100px;font-size:10px;font-family:var(--mono);font-weight:600;letter-spacing:.3px;}
.badge-active{background:rgba(96,200,136,0.1);color:var(--green);border:1px solid rgba(96,200,136,0.2);}
.badge-inactive{background:rgba(232,96,96,0.1);color:var(--red);border:1px solid rgba(232,96,96,0.2);}
.badge-admin{background:rgba(232,168,56,0.12);color:var(--amber);border:1px solid rgba(232,168,56,0.25);}

.actions{display:flex;gap:5px;flex-wrap:wrap;}
.act-btn{padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;font-family:var(--font);cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .12s;white-space:nowrap;}
.act-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2);}
.act-btn.danger:hover{color:var(--red);border-color:rgba(232,96,96,.4);background:rgba(232,96,96,.07);}
.act-btn.success:hover{color:var(--green);border-color:rgba(96,200,136,.4);background:rgba(96,200,136,.07);}
.act-btn.warn:hover{color:var(--amber);border-color:rgba(224,160,64,.4);background:rgba(224,160,64,.07);}
.act-btn.purple{color:var(--purple);border-color:rgba(176,138,224,.3);background:rgba(176,138,224,.07);}
.act-btn.purple:hover{background:rgba(176,138,224,.15);border-color:rgba(176,138,224,.5);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:min(440px,92vw);
  padding:28px;box-shadow:0 24px 64px rgba(0,0,0,.5);animation:fadeIn .18s ease;}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);flex:1;padding:9px 16px;
  border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{background:var(--bg4);color:var(--text);}
.btn-danger{background:rgba(232,96,96,.12);color:var(--red);border:1px solid rgba(232,96,96,.3);flex:1;padding:9px 16px;
  border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-danger:hover{background:rgba(232,96,96,.22);}
.btn-success{background:var(--accent-bg);color:#1a1917;border:none;flex:1;padding:9px 16px;
  border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-success:hover{background:var(--accent-bg2);}
.modal-status{font-size:12px;margin-top:10px;padding:8px 12px;border-radius:var(--radius-sm);display:none;line-height:1.5;}
.modal-status.ok{background:rgba(96,200,136,.1);color:var(--green);border:1px solid rgba(96,200,136,.2);display:block;}
.modal-status.err{background:rgba(232,96,96,.08);color:var(--red);border:1px solid rgba(232,96,96,.2);display:block;}
.empty{text-align:center;padding:48px;color:var(--text3);font-size:13px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" width="20" height="20"><path d="M4 16V9l6-5 6 5v7H13v-5H7v5H4z" fill="#1a1917"/></svg>
      </div>
      <div>
        <div class="login-name">Pursuit</div>
        <div class="login-badge">ADMIN CONSOLE</div>
      </div>
    </div>
    <div class="login-heading">Administrator access</div>
    <div class="login-sub">Sign in with your admin credentials to continue.</div>
    <div class="field">
      <label>USERNAME</label>
      <input id="login-user" type="text" placeholder="Admin username" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input id="login-pass" type="password" placeholder="Admin password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign in
    </button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo-mark" style="width:30px;height:30px">
        <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M4 16V9l6-5 6 5v7H13v-5H7v5H4z" fill="#1a1917"/></svg>
      </div>
      <span class="topbar-name">Pursuit</span>
      <span class="topbar-pill">ADMIN</span>
      <span class="topbar-version" id="topbar-version">v1.4.0</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="loadUsers()" id="refresh-btn" title="Refresh">
        <svg id="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
        Refresh
      </button>
      <span class="topbar-user" id="topbar-user"></span>
      <button class="topbar-btn logout" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">TOTAL USERS</div><div class="stat-value" id="stat-total" style="color:var(--blue)">—</div></div>
      <div class="stat-card"><div class="stat-label">ACTIVE</div><div class="stat-value" id="stat-active" style="color:var(--green)">—</div></div>
      <div class="stat-card"><div class="stat-label">DEACTIVATED</div><div class="stat-value" id="stat-inactive" style="color:var(--red)">—</div></div>
    </div>

    <div class="section-header">
      <div class="section-title">Users</div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input class="search-input" id="user-search" placeholder="Search username or email…" oninput="renderTable()">
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>USER</th><th>EMAIL</th><th>JOINED</th><th>LAST LOGIN</th><th>STATUS</th><th>ACTIONS</th>
        </tr></thead>
        <tbody id="user-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modal-reset" onclick="if(event.target===this)closeModal('modal-reset')">
  <div class="modal">
    <div class="modal-title">Reset Password</div>
    <div class="modal-sub" id="modal-reset-sub"></div>
    <div class="field"><label>NEW PASSWORD</label><input id="modal-new-pw" type="password" placeholder="Min 6 characters"></div>
    <div class="modal-status" id="modal-reset-status"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-reset')">Cancel</button>
      <button class="btn-success" onclick="submitReset()">Set Password</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-link" onclick="if(event.target===this)closeModal('modal-link')">
  <div class="modal">
    <div class="modal-title">Send Reset Link</div>
    <div class="modal-sub" id="modal-link-sub"></div>
    <div class="modal-status" id="modal-link-status"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-link')">Cancel</button>
      <button class="btn-success" onclick="submitSendLink()">Send Email</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-deactivate" onclick="if(event.target===this)closeModal('modal-deactivate')">
  <div class="modal">
    <div class="modal-title" id="modal-deactivate-title"></div>
    <div class="modal-sub" id="modal-deactivate-sub"></div>
    <div class="modal-status" id="modal-deactivate-status"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-deactivate')">Cancel</button>
      <button id="modal-deactivate-btn" class="btn-danger" onclick="submitDeactivate()">Confirm</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-delete" onclick="if(event.target===this)closeModal('modal-delete')">
  <div class="modal">
    <div class="modal-title" style="color:var(--red)">Delete User</div>
    <div class="modal-sub" id="modal-delete-sub"></div>
    <div class="modal-status" id="modal-delete-status"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-delete')">Cancel</button>
      <button class="btn-danger" onclick="submitDelete()">Permanently Delete</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-edit" onclick="if(event.target===this)closeModal('modal-edit')">
  <div class="modal">
    <div class="modal-title">Edit User</div>
    <div class="modal-sub" id="modal-edit-sub"></div>
    <div class="field"><label>EMAIL</label><input type="email" id="modal-edit-email" placeholder="user@example.com"></div>
    <div class="field"><label>USERNAME <span style="color:var(--text3);font-weight:400">(read-only)</span></label><input id="modal-edit-username" readonly></div>
    <div class="modal-status" id="modal-edit-status"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-edit')">Cancel</button>
      <button class="btn-success" onclick="submitEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const API='', APP_VERSION='1.4.0';
let token=sessionStorage.getItem('admin_token');
let adminUser=sessionStorage.getItem('admin_user');
let users=[],selectedUser=null,deactivateAction=null;

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('topbar-version').textContent='v'+APP_VERSION;
  if(token){showApp();loadUsers();}else showLogin();
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app-screen').style.display='none';}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app-screen').style.display='flex';document.getElementById('topbar-user').textContent=adminUser||'';}

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-error');
  err.textContent='';btn.disabled=true;
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" style="animation:spin .7s linear infinite" fill="none"><circle cx="6" cy="6" r="4.5" stroke="rgba(26,25,23,0.3)" stroke-width="1.5"/><path d="M6 1.5A4.5 4.5 0 0110.5 6" stroke="#1a1917" stroke-width="1.5" stroke-linecap="round"/></svg> Signing in\u2026';
  try{
    const res=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.error||'Login failed';return;}
    if(!data.isAdmin){err.textContent='This account does not have admin access.';return;}
    token=data.token;adminUser=data.username;
    sessionStorage.setItem('admin_token',token);
    sessionStorage.setItem('admin_user',adminUser);
    showApp();loadUsers();
  }catch(e){err.textContent='Connection error: '+e.message;}
  finally{
    btn.disabled=false;
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign in';
  }
}

function doLogout(){sessionStorage.clear();token=null;adminUser=null;users=[];showLogin();}

async function loadUsers(){
  const icon=document.getElementById('refresh-icon');
  if(icon)icon.style.animation='spin .7s linear infinite';
  try{
    const res=await fetch(API+'/api/admin/users',{headers:{Authorization:'Bearer '+token}});
    if(res.status===401||res.status===403){doLogout();return;}
    users=await res.json();
    updateStats();renderTable();
  }catch(e){console.error(e);}
  finally{if(icon)icon.style.animation='';}
}

function updateStats(){
  const active=users.filter(u=>u.isActive).length;
  document.getElementById('stat-total').textContent=users.length;
  document.getElementById('stat-active').textContent=active;
  document.getElementById('stat-inactive').textContent=users.length-active;
}

function renderTable(){
  const q=(document.getElementById('user-search').value||'').toLowerCase();
  const filtered=users.filter(u=>!q||u.username.toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q));
  const tbody=document.getElementById('user-tbody');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="6" class="empty">No users found</td></tr>';return;}
  tbody.innerHTML=filtered.map(u=>`
    <tr>
      <td>
        <div style="font-weight:500;color:var(--text)">${esc(u.username)}</div>
        ${u.isAdmin?'<span class="badge badge-admin" style="margin-top:3px;display:inline-block">ADMIN</span>':''}
      </td>
      <td style="color:var(--text2);font-size:12px;font-family:var(--mono)">${esc(u.email||'\u2014')}</td>
      <td style="font-size:12px;color:var(--text3);white-space:nowrap">${fmtDate(u.createdAt)}</td>
      <td style="font-size:12px;color:var(--text3);white-space:nowrap">${u.lastLogin?fmtDate(u.lastLogin):'\u2014'}</td>
      <td><span class="badge ${u.isActive?'badge-active':'badge-inactive'}">${u.isActive?'Active':'Inactive'}</span></td>
      <td>${u.isAdmin
        ?'<span style="font-size:12px;color:var(--text3)">Admin account</span>'
        :`<div class="actions">
          <button class="act-btn" onclick="openEdit('${esc(u.username)}','${esc(u.email||'')}')">Edit</button>
          <button class="act-btn ${u.isActive?'danger':'success'}" onclick="openDeactivate('${esc(u.username)}',${!u.isActive})">${u.isActive?'Deactivate':'Reactivate'}</button>
          <button class="act-btn warn" onclick="openReset('${esc(u.username)}','${esc(u.email||'')}')">Reset PW</button>
          <button class="act-btn purple" onclick="adminResetRecoveryCodes('${esc(u.username)}')">Rec. codes</button>
          <button class="act-btn" onclick="openSendLink('${esc(u.username)}','${esc(u.email||'')}')">Send link</button>
          <button class="act-btn danger" onclick="openDelete('${esc(u.username)}')">Delete</button>
        </div>`}
      </td>
    </tr>`).join('');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');clearModalStatus(id);}
function clearModalStatus(id){const s=document.querySelector('#'+id+' .modal-status');if(s){s.className='modal-status';s.textContent='';}}
function setModalStatus(id,type,msg){const s=document.querySelector('#'+id+' .modal-status');if(s){s.className='modal-status '+(type==='ok'?'ok':'err');s.textContent=msg;}}

function openDeactivate(username,makeActive){
  selectedUser=username;deactivateAction=makeActive;
  document.getElementById('modal-deactivate-title').textContent=makeActive?'Reactivate Account':'Deactivate Account';
  document.getElementById('modal-deactivate-sub').textContent=makeActive
    ?`Reactivate ${username}'s account? They will be able to sign in again.`
    :`Deactivate ${username}'s account? They will not be able to sign in.`;
  const btn=document.getElementById('modal-deactivate-btn');
  btn.textContent=makeActive?'Reactivate':'Deactivate';
  btn.className=makeActive?'btn-success':'btn-danger';
  openModal('modal-deactivate');
}
async function submitDeactivate(){
  try{
    const res=await fetch(API+'/api/admin/deactivate',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({username:selectedUser,active:deactivateAction})});
    const data=await res.json();
    if(!res.ok){setModalStatus('modal-deactivate','err',data.error);return;}
    setModalStatus('modal-deactivate','ok',deactivateAction?'Account reactivated.':'Account deactivated.');
    await loadUsers();setTimeout(()=>closeModal('modal-deactivate'),1500);
  }catch(e){setModalStatus('modal-deactivate','err',e.message);}
}

function openReset(username,email){
  selectedUser=username;
  document.getElementById('modal-reset-sub').textContent=`Set a new password for ${username}${email?' \u00b7 '+email:''}. An email will be sent if an address is on file.`;
  document.getElementById('modal-new-pw').value='';
  openModal('modal-reset');setTimeout(()=>document.getElementById('modal-new-pw').focus(),80);
}
async function submitReset(){
  const pw=document.getElementById('modal-new-pw').value;
  if(pw.length<6){setModalStatus('modal-reset','err','Password must be at least 6 characters');return;}
  try{
    const res=await fetch(API+'/api/admin/reset-password',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({username:selectedUser,newPassword:pw})});
    const data=await res.json();
    if(!res.ok){setModalStatus('modal-reset','err',data.error);return;}
    setModalStatus('modal-reset','ok','Password updated successfully.');
    setTimeout(()=>closeModal('modal-reset'),1800);
  }catch(e){setModalStatus('modal-reset','err',e.message);}
}

function openSendLink(username,email){
  selectedUser=username;
  if(!email){alert('No email address on file for this user.');return;}
  document.getElementById('modal-link-sub').textContent=`Send a self-service password reset link to ${username} at ${email}. The link expires in 1 hour.`;
  openModal('modal-link');
}
async function submitSendLink(){
  try{
    const res=await fetch(API+'/api/admin/send-reset-link',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({username:selectedUser})});
    const data=await res.json();
    if(!res.ok||!data.ok){setModalStatus('modal-link','err',data.error||'Failed to send');return;}
    setModalStatus('modal-link','ok','Reset link sent successfully.');
    setTimeout(()=>closeModal('modal-link'),1800);
  }catch(e){setModalStatus('modal-link','err',e.message);}
}

function openDelete(username){
  selectedUser=username;
  document.getElementById('modal-delete-sub').textContent=`Permanently delete ${username}'s account. All data will be removed. This cannot be undone.`;
  openModal('modal-delete');
}
async function submitDelete(){
  try{
    const res=await fetch(API+'/api/admin/users/'+encodeURIComponent(selectedUser),{method:'DELETE',headers:{Authorization:'Bearer '+token}});
    const data=await res.json();
    if(!res.ok){setModalStatus('modal-delete','err',data.error);return;}
    setModalStatus('modal-delete','ok','User deleted.');
    await loadUsers();setTimeout(()=>closeModal('modal-delete'),1500);
  }catch(e){setModalStatus('modal-delete','err',e.message);}
}

function openEdit(username,email){
  selectedUser=username;
  document.getElementById('modal-edit-sub').textContent=`Update profile for ${username}`;
  document.getElementById('modal-edit-username').value=username;
  document.getElementById('modal-edit-email').value=email||'';
  openModal('modal-edit');setTimeout(()=>document.getElementById('modal-edit-email').focus(),80);
}
async function submitEdit(){
  const email=document.getElementById('modal-edit-email').value.trim();
  if(!email||!email.includes('@')){setModalStatus('modal-edit','err','Enter a valid email address');return;}
  try{
    const res=await fetch(API+'/api/admin/update-user',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({username:selectedUser,email})});
    const data=await res.json();
    if(!res.ok){setModalStatus('modal-edit','err',data.error||'Failed');return;}
    setModalStatus('modal-edit','ok','Saved.');
    await loadUsers();setTimeout(()=>closeModal('modal-edit'),1200);
  }catch(e){setModalStatus('modal-edit','err',e.message);}
}

async function adminResetRecoveryCodes(username){
  if(!confirm(`Generate new recovery codes for ${username}?\n\nThis will invalidate all existing codes.`))return;
  try{
    const res=await fetch(API+'/api/admin/reset-recovery-codes',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({username})});
    const data=await res.json();
    if(!res.ok){alert('Error: '+(data.error||'Failed'));return;}
    const codes=(data.recoveryCodes||[]).join('\n');
    alert(`New recovery codes for ${username}:\n\n${codes}\n\nSave these \u2014 they won\u2019t be shown again.`+(data.emailed?'\n\nEmail sent to user.':'\n(No email on file \u2014 share manually.)'));
  }catch(e){alert('Could not connect to server.');}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){if(!ts)return '\u2014';return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
</script>
