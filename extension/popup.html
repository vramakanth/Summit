<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #120800; color: #f2ead8; width: 360px; min-height: 220px; }

  /* Header */
  .header { padding: 13px 16px; background: #1a0d00; border-bottom: 1px solid rgba(232,168,56,0.15); display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; background: rgba(232,168,56,0.15); border: 1px solid rgba(232,168,56,0.3); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { opacity: 0.9; }
  .header-title { font-size: 14px; font-weight: 700; color: #f2ead8; letter-spacing: -0.3px; }
  .header-sub { font-size: 10px; color: rgba(242,234,216,0.4); letter-spacing: 0.3px; margin-top: 1px; }

  /* Parse progress bar */
  .parse-bar { height: 2px; background: rgba(232,168,56,0.1); position: relative; overflow: hidden; display: none; }
  .parse-bar.active { display: block; }
  .parse-bar-fill { height: 100%; background: #e8a838; width: 0%; transition: width 0.4s ease; }

  /* Body */
  .body { padding: 14px 16px; }

  /* URL chip */
  .url-chip { display: flex; align-items: center; gap: 7px; padding: 7px 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; margin-bottom: 12px; }
  .url-chip .favicon { width: 14px; height: 14px; flex-shrink: 0; border-radius: 2px; }
  .url-chip .url-text { font-size: 10px; color: rgba(242,234,216,0.4); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .url-chip .parse-status-inline { font-size: 10px; color: #e8a838; flex-shrink: 0; }

  /* Fields */
  label { display: block; font-size: 10px; font-weight: 600; color: rgba(242,234,216,0.4); letter-spacing: 0.6px; margin-bottom: 4px; font-family: monospace; text-transform: uppercase; }
  .source-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-family: monospace; background: rgba(232,168,56,0.15); color: rgba(232,168,56,0.8); margin-left: 4px; vertical-align: middle; }
  input, select { width: 100%; padding: 7px 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #f2ead8; font-size: 12px; font-family: inherit; outline: none; transition: border 0.15s; }
  input:focus, select:focus { border-color: #e8a838; background: rgba(255,255,255,0.09); }
  input::placeholder { color: rgba(242,234,216,0.25); }
  select option { background: #1a0d00; }
  .section { margin-bottom: 10px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

  /* Buttons */
  .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: -0.2px; }
  .btn-primary { background: #e8a838; color: #1a0d00; }
  .btn-primary:hover { background: #f0b84a; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: rgba(255,255,255,0.06); color: rgba(242,234,216,0.7); border: 1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); }

  /* Status */
  .status { font-size: 11px; padding: 7px 10px; border-radius: 6px; margin-top: 8px; display: none; line-height: 1.4; }
  .status.show { display: block; }
  .status.success { background: rgba(232,168,56,0.1); color: #e8a838; border: 1px solid rgba(232,168,56,0.2); }
  .status.error   { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  .status.info    { background: rgba(255,255,255,0.05); color: rgba(242,234,216,0.6); border: 1px solid rgba(255,255,255,0.08); }

  /* Footer */
  .footer { padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.07); display: flex; justify-content: space-between; align-items: center; }
  .link { font-size: 11px; color: rgba(242,234,216,0.35); background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }
  .link:hover { color: rgba(242,234,216,0.7); }

  /* Login */
  #login-view, #main-view { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
      <path d="M4 16V9l6-5 6 5v7H13v-5H7v5H4z" fill="#e8a838"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Summit</div>
    <div class="header-sub" id="header-sub">Job Tracker</div>
  </div>
</div>
<div class="parse-bar" id="parse-bar"><div class="parse-bar-fill" id="parse-bar-fill"></div></div>

<!-- LOGIN -->
<div id="login-view" class="body">
  <div class="section">
    <label>Username</label>
    <input id="username" placeholder="Your username" autocomplete="username">
  </div>
  <div class="section">
    <label>Password</label>
    <input id="password" type="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
  <div class="status" id="login-status"></div>
</div>

<!-- MAIN -->
<div id="main-view">
  <div class="body">

    <!-- URL chip -->
    <div class="url-chip">
      <img class="favicon" id="favicon" src="" alt="" style="display:none">
      <span class="url-text" id="detected-url">Reading page...</span>
      <span class="parse-status-inline" id="parse-inline"></span>
    </div>

    <!-- Fields pre-filled by parse -->
    <div class="section">
      <label>Job Title <span class="source-badge" id="title-badge" style="display:none"></span></label>
      <input id="job-title" placeholder="e.g. Senior Software Engineer">
    </div>
    <div class="section">
      <label>Company <span class="source-badge" id="company-badge" style="display:none"></span></label>
      <input id="job-company" placeholder="e.g. Acme Corp">
    </div>
    <div class="field-row">
      <div>
        <label>Work Type</label>
        <select id="job-worktype">
          <option value="">—</option>
          <option value="Remote">Remote</option>
          <option value="Hybrid">Hybrid</option>
          <option value="On-site">On-site</option>
        </select>
      </div>
      <div>
        <label>Location</label>
        <input id="job-location" placeholder="City, State">
      </div>
    </div>
    <div class="section">
      <label>Salary (optional)</label>
      <input id="job-salary" placeholder="e.g. $120k–$150k">
    </div>

    <button class="btn btn-primary" id="add-btn" onclick="addJob()">+ Add to Summit</button>
    <div class="status" id="add-status"></div>
  </div>

  <div class="footer">
    <button class="link" onclick="openTracker()">Open Summit ↗</button>
    <button class="link" onclick="signOut()">Sign out</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
