<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1917; color: #e8e6e3; width: 340px; min-height: 200px; }
  .header { padding: 14px 16px; background: #222220; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
  .logo { width: 24px; height: 24px; background: #a3e635; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #1a1917; flex-shrink: 0; }
  .header-title { font-size: 14px; font-weight: 600; }
  .header-sub { font-size: 11px; color: #888; }
  .body { padding: 16px; }
  .section { margin-bottom: 14px; }
  label { display: block; font-size: 10px; font-weight: 600; color: #888; letter-spacing: .5px; margin-bottom: 5px; font-family: monospace; }
  input, textarea { width: 100%; padding: 8px 10px; background: #2a2927; border: 1px solid #444; border-radius: 6px; color: #e8e6e3; font-size: 12px; font-family: inherit; outline: none; transition: border 0.15s; }
  input:focus, textarea:focus { border-color: #a3e635; }
  textarea { resize: vertical; min-height: 56px; }
  .btn { width: 100%; padding: 10px; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn-primary { background: #a3e635; color: #1a1917; }
  .btn-primary:hover { background: #bef264; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: #2a2927; color: #aaa; border: 1px solid #444; }
  .btn-secondary:hover { background: #333; }
  .status { font-size: 12px; padding: 8px 10px; border-radius: 6px; margin-top: 10px; display: none; }
  .status.success { background: rgba(163,230,53,0.1); color: #a3e635; border: 1px solid rgba(163,230,53,0.2); display: block; }
  .status.error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); display: block; }
  .status.info { background: rgba(59,130,246,0.1); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); display: block; }
  .divider { height: 1px; background: #333; margin: 12px 0; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #login-view, #main-view { display: none; }
  .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-family: monospace; background: #333; color: #aaa; }
  .detected-field { padding: 8px 10px; background: #2a2927; border: 1px solid #444; border-radius: 6px; font-size: 12px; color: #e8e6e3; }
  .detected-field .source { font-size: 10px; color: #666; margin-top: 2px; }
  .footer { padding: 8px 16px; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  .footer a, .footer button.link { font-size: 11px; color: #666; text-decoration: none; background: none; border: none; cursor: pointer; font-family: inherit; }
  .footer a:hover, .footer button.link:hover { color: #aaa; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">A</div>
  <div>
    <div class="header-title">Applied</div>
    <div class="header-sub">Sign in to your account</div>
  </div>
</div>

<div id="login-view" class="body">
  <div class="section">
    <label>USERNAME</label>
    <input id="username" placeholder="Enter your username">
  </div>
  <div class="section">
    <label>PASSWORD</label>
    <input id="password" type="password" placeholder="Enter your password">
  </div>
  <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
  <div class="status" id="login-status"></div>
</div>

<div id="main-view" class="body">
  <div class="section">
    <label>JOB URL (CURRENT PAGE)</label>
    <div class="detected-field" id="detected-url" style="word-break:break-all;font-size:11px;font-family:monospace;color:#666">Reading address bar...</div>
  </div>
  <div class="section">
    <label>JOB TITLE <span class="tag" id="title-source"></span></label>
    <input id="job-title" placeholder="e.g. Senior Software Engineer">
  </div>
  <div class="section">
    <label>COMPANY <span class="tag" id="company-source"></span></label>
    <input id="job-company" placeholder="e.g. Acme Corp">
  </div>
  <div class="field-row">
    <div>
      <label>WORK TYPE</label>
      <select id="job-worktype" style="width:100%;padding:8px 10px;background:#2a2927;border:1px solid #444;border-radius:6px;color:#e8e6e3;font-size:12px;font-family:inherit;outline:none">
        <option value="">—</option>
        <option value="Remote">Remote</option>
        <option value="Hybrid">Hybrid</option>
        <option value="On-site">On-site</option>
      </select>
    </div>
    <div>
      <label>LOCATION</label>
      <input id="job-location" placeholder="City, State">
    </div>
  </div>
  <div class="section" style="margin-top:10px">
    <label>SALARY (OPTIONAL)</label>
    <input id="job-salary" placeholder="e.g. $120k–$150k">
  </div>
  <button class="btn btn-primary" id="add-btn" onclick="addJob()" style="margin-top:4px">
    + Add to Applied
  </button>
  <div class="status" id="add-status"></div>
  <div class="footer" style="padding:12px 0 0;border:none">
    <button class="link" onclick="openTracker()">Open tracker ↗</button>
    <button class="link" onclick="signOut()">Sign out</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
